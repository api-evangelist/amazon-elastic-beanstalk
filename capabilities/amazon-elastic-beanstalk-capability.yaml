naftiko: 1.0.0-alpha1
info:
  label: Amazon Elastic Beanstalk Management
  description: Unified capability for managing Amazon Elastic Beanstalk resources. Combines Amazon Elastic Beanstalk APIs for Application Developer workflows in Application Deployment.
  tags:
  - Amazon Web Services
  - Platform As A Service
  - Deployment
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_API_KEY: AWS_API_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: elastic_beanstalk
    location: ./shared/elastic-beanstalk.yaml
  exposes:
  - type: rest
    port: 8180
    namespace: amazon-elastic-beanstalk-workflow-api
    description: Unified REST API for Amazon Elastic Beanstalk management.
    resources:
    - path: /v1/describeApplications
      name: describeApplications
      description: Amazon Elastic Beanstalk Describe Applications
      operations:
      - method: GET
        name: describeApplications
        description: Amazon Elastic Beanstalk Describe Applications
        call: api.describeApplications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/createApplication
      name: createApplication
      description: Amazon Elastic Beanstalk Create Application
      operations:
      - method: POST
        name: createApplication
        description: Amazon Elastic Beanstalk Create Application
        call: api.createApplication
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/createEnvironment
      name: createEnvironment
      description: Amazon Elastic Beanstalk Create Environment
      operations:
      - method: POST
        name: createEnvironment
        description: Amazon Elastic Beanstalk Create Environment
        call: api.createEnvironment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/describeEnvironments
      name: describeEnvironments
      description: Amazon Elastic Beanstalk Describe Environments
      operations:
      - method: GET
        name: describeEnvironments
        description: Amazon Elastic Beanstalk Describe Environments
        call: api.describeEnvironments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/updateEnvironment
      name: updateEnvironment
      description: Amazon Elastic Beanstalk Update Environment
      operations:
      - method: POST
        name: updateEnvironment
        description: Amazon Elastic Beanstalk Update Environment
        call: api.updateEnvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9190
    namespace: amazon-elastic-beanstalk-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Elastic Beanstalk management.
    tools:
    - name: describeApplications
      description: Amazon Elastic Beanstalk Describe Applications
      hints:
        readOnly: true
      call: api.describeApplications
      outputParameters:
      - type: object
        mapping: $.
    - name: createApplication
      description: Amazon Elastic Beanstalk Create Application
      hints:
        readOnly: false
      call: api.createApplication
      outputParameters:
      - type: object
        mapping: $.
    - name: createEnvironment
      description: Amazon Elastic Beanstalk Create Environment
      hints:
        readOnly: false
      call: api.createEnvironment
      outputParameters:
      - type: object
        mapping: $.
    - name: describeEnvironments
      description: Amazon Elastic Beanstalk Describe Environments
      hints:
        readOnly: true
      call: api.describeEnvironments
      outputParameters:
      - type: object
        mapping: $.
    - name: updateEnvironment
      description: Amazon Elastic Beanstalk Update Environment
      hints:
        readOnly: false
      call: api.updateEnvironment
      outputParameters:
      - type: object
        mapping: $.
