name: Amazon Elastic Beanstalk
description: >-
  AWS Elastic Beanstalk is a platform-as-a-service (PaaS) that makes it easy to deploy, manage, and scale web
  applications and services. You simply upload your code and Elastic Beanstalk automatically handles the deployment,
  capacity provisioning, load balancing, auto-scaling, and application health monitoring.
